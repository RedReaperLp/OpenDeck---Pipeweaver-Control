<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PipeWire Mixer Inspector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1012;
      --card: #131416;
      --text: #ffffff;
      --line: #2e3035;
      --line-soft: #4c4f57;
      --accent: #00d2ff;
      --slider-fill: #ffffff;
      --slider-base: #1f2228;
      --thumb-a: #ffffff;
      --thumb-b: #d7d7d7;
      --meter-fill: linear-gradient(90deg, #46d66d, #ffe14d, #ff4d4d);
      --meter-bg: #101217;
    }

    * { box-sizing: border-box; }
    body { margin: 0; padding: 14px; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    body.muted { --slider-fill: #ff2f45; --slider-base: #2b1419; --thumb-a: #ffb4bc; --thumb-b: #ff2f45; --meter-fill: #2d2d2d; --meter-bg: #171717; }

    .card { background: var(--card); border: 2px solid var(--line); border-radius: 12px; padding: 14px; box-shadow: inset 0 0 0 1px var(--line-soft), 0 12px 24px rgba(0,0,0,0.36); }
    h1 { margin: 0 0 2px; font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }
    .subtitle { margin: 0 0 14px; font-size: 12px; color: #c5c7cd; }
    .row { display: grid; gap: 8px; margin-bottom: 13px; }
    .hidden { display: none !important; }

    label, .sectionLabel { font-size: 12px; color: #d7d8dc; }
    select, input[type="color"], input[type="range"] { width: 100%; }
    select { background: #0d0e12; color: #ffffff; border: 1px solid var(--line-soft); border-radius: 8px; padding: 8px; }
    input[type="color"] { height: 34px; background: #0d0e12; border: 1px solid var(--line-soft); border-radius: 8px; padding: 4px; }

    input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; height: 24px; --step-progress: 50%; }
    input[type="range"]::-webkit-slider-runnable-track { height: 6px; border-radius: 999px; background: linear-gradient(90deg, var(--slider-fill) 0%, var(--slider-fill) var(--step-progress), var(--slider-base) var(--step-progress), var(--slider-base) 100%); border: 1px solid #3b3e47; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; margin-top: -7px; width: 18px; height: 18px; border-radius: 50%; border: 2px solid #101216; background: radial-gradient(circle at 30% 30%, var(--thumb-a) 0%, var(--thumb-b) 70%); box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08); cursor: pointer; }

    .line { display: flex; align-items: center; gap: 8px; }
    .value { width: 85px; text-align: right; font-size: 12px; color: #ffffff; font-weight: bold; }
    .value.hex { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; font-weight: normal; }
    #muteValue { font-weight: 700; color: #63f598; }
    #muteValue.muted { color: #ff3333; }

    .meter { width: 100%; height: 10px; border-radius: 999px; background: var(--meter-bg); border: 1px solid var(--line-soft); overflow: hidden; }
    .meter > span { display: block; height: 100%; width: 0%; background: var(--meter-fill); transition: width 180ms ease-out; }
    .status { font-size: 12px; color: #c5c7cd; }

    .checkbox-line { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-line input { width: 16px; height: 16px; cursor: pointer; }
  </style>
</head>
<body>
<div class="card">
  <h1>PipeWire Action</h1>
  <p id="actionLabel" class="subtitle">Action: Mute Toggle</p>

  <div id="mixerRow" class="row">
    <label for="nodeSelect">Audio Track / Node</label>
    <select id="nodeSelect"><option value="">No nodes found</option></select>
  </div>

  <div id="targetMuteRow" class="row hidden">
    <label for="targetMuteSelect">Output Channel / Target</label>
    <select id="targetMuteSelect"><option value="">No output channels found</option></select>
  </div>

  <div id="targetToggleRow" class="row hidden">
    <div style="margin-bottom: 10px;">
      <label for="targetASelect">Target A (Toggle)</label>
      <select id="targetASelect"><option value="">No devices found</option></select>
    </div>
    <div>
      <label for="targetBSelect">Target B (Toggle)</label>
      <select id="targetBSelect"><option value="">No devices found</option></select>
    </div>
  </div>

  <div id="statusCheckboxRow" class="row">
    <label class="checkbox-line">
      <input type="checkbox" id="statusCheckbox" />
      Status Only (Disable key functions)
    </label>
  </div>

  <div id="stepRow" class="row">
    <label for="stepSlider">Step Size (- for Down, + for Up, 0 for Mute Toggle)</label>
    <div class="line">
      <input id="stepSlider" type="range" min="-30" max="30" step="1" value="0" />
      <div id="stepValue" class="value">Toggle</div>
    </div>
  </div>

  <div id="ampRow" class="row hidden">
    <label for="ampSlider">Volume Meter Amplifier</label>
    <div class="line">
      <input id="ampSlider" type="range" min="1" max="10" step="0.5" value="1" />
      <div id="ampValue" class="value">1.0x</div>
    </div>
  </div>

  <div id="meterRow" class="row">
    <label>Volume Level</label>
    <div class="line">
      <div id="volumeValue" class="value">0%</div>
      <div id="muteValue" class="value">LIVE</div>
    </div>
    <div class="meter"><span id="meterFill"></span></div>
  </div>

  <div id="status" class="status">Waiting for connection...</div>
</div>
<script src="inspector.js"></script>
</body>
</html>
